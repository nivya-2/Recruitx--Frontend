<app-common-layout>
  <app-cards class="custom-padding"> 
    <div class="admin-dashboard-header">
      <app-header-text context="table-header" [nopad]="true">Job Requisitions</app-header-text>
      <app-button-icon label="Upload" [actionfn]="uploadModal.bind(this)" icon="upload" ></app-button-icon>
    </div>
      <app-modal  [(visible)]="visible"  header="Add Candidates" [maximizable]="true" [headerBgColor]="'#7B61FF'"
       [style]="{ width: '50rem', height: '35rem' }">
       <app-upload></app-upload>
      </app-modal>
    <app-table [dataSource]="dataSource" [columns]="columns" [globalFilterFields]="globalFilterFields" [hover]="false" [rows]="7" [showFilter]="true"
    [fontSize]="'12px'"></app-table>
</app-cards>
</app-common-layout>
